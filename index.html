<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    h1 {
      font-size: 2.5rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #e94560;
    }

    .status {
      font-size: 1.2rem;
      color: #a8a8b3;
      min-height: 1.6rem;
    }

    .status span {
      color: #e94560;
      font-weight: bold;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.taken { cursor: default; }

    .cell.x { color: #e94560; }
    .cell.o { color: #4cc9f0; }

    .cell.winner {
      background: #0f3460;
      animation: pulse 0.6s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to   { transform: scale(1.08); }
    }

    .scores {
      display: flex;
      gap: 32px;
      background: #16213e;
      padding: 12px 32px;
      border-radius: 12px;
    }

    .score {
      text-align: center;
    }

    .score-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #a8a8b3;
    }

    .score-value {
      font-size: 2rem;
      font-weight: bold;
    }

    .score.x .score-value { color: #e94560; }
    .score.o .score-value { color: #4cc9f0; }
    .score.draw .score-value { color: #a8a8b3; }

    .reset-btn {
      padding: 12px 40px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .reset-btn:hover {
      background: #c73652;
      transform: translateY(-2px);
    }

    .reset-btn:active { transform: translateY(0); }
  </style>
</head>
<body>
  <div class="container">
    <h1>Tic Tac Toe</h1>

    <div class="scores">
      <div class="score x">
        <div class="score-label">X</div>
        <div class="score-value" id="score-x">0</div>
      </div>
      <div class="score draw">
        <div class="score-label">Draws</div>
        <div class="score-value" id="score-draw">0</div>
      </div>
      <div class="score o">
        <div class="score-label">O</div>
        <div class="score-value" id="score-o">0</div>
      </div>
    </div>

    <div class="status" id="status">Player <span>X</span>'s turn</div>

    <div class="board" id="board">
      <div class="cell" data-index="0"></div>
      <div class="cell" data-index="1"></div>
      <div class="cell" data-index="2"></div>
      <div class="cell" data-index="3"></div>
      <div class="cell" data-index="4"></div>
      <div class="cell" data-index="5"></div>
      <div class="cell" data-index="6"></div>
      <div class="cell" data-index="7"></div>
      <div class="cell" data-index="8"></div>
    </div>

    <button class="reset-btn" id="reset-btn">New Game</button>
  </div>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board = Array(9).fill(null);
    let current = 'X';
    let gameOver = false;
    const scores = { X: 0, O: 0, draw: 0 };

    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');
    const resetBtn = document.getElementById('reset-btn');

    cells.forEach(cell => cell.addEventListener('click', () => {
      const i = +cell.dataset.index;
      if (gameOver || board[i]) return;

      board[i] = current;
      cell.textContent = current;
      cell.classList.add('taken', current.toLowerCase());

      const win = checkWin();
      if (win) {
        win.forEach(idx => cells[idx].classList.add('winner'));
        status.innerHTML = `Player <span>${current}</span> wins!`;
        scores[current]++;
        updateScores();
        gameOver = true;
      } else if (board.every(Boolean)) {
        status.innerHTML = `It's a <span>draw</span>!`;
        scores.draw++;
        updateScores();
        gameOver = true;
      } else {
        current = current === 'X' ? 'O' : 'X';
        status.innerHTML = `Player <span>${current}</span>'s turn`;
      }
    }));

    resetBtn.addEventListener('click', () => {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      cells.forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      status.innerHTML = `Player <span>X</span>'s turn`;
    });

    function checkWin() {
      return WINS.find(([a, b, c]) =>
        board[a] && board[a] === board[b] && board[a] === board[c]
      ) || null;
    }

    function updateScores() {
      document.getElementById('score-x').textContent = scores.X;
      document.getElementById('score-o').textContent = scores.O;
      document.getElementById('score-draw').textContent = scores.draw;
    }
  </script>
</body>
</html>
